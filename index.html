<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Road Show Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

#top {
  padding: 10px;
  background: #1c1c1c;
  font-size: 14px;
}

#map {
  height: 65vh;
  width: 100%;
}

.panel {
  padding: 10px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  margin-right: 5px;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="top">
🚗 Road Show | Leaflet MVP | режим: LIVE SIM
</div>

<div id="map"></div>

<div class="panel">

  <div class="card">
    🧭 Маршрут: СПб → Москва → Ярославль → Тверь
  </div>

  <div class="card">
    🚗 Машина двигается по маршруту (симуляция)
  </div>

  <div class="card">
    🎮 Миссии (очередь заказов)
  </div>

  <div class="card">
    🟡 Активная миссия:
    <div id="activeMission">— нет миссии</div>
  </div>

  <div class="card">
    📋 Очередь:
    <ul id="missionQueue"></ul>
  </div>

  <div class="card">
    <button onclick="completeMission()">✅ Выполнено</button>
    <button onclick="nextMission()">➡️ Взять следующий заказ</button>
  </div>

</div>

<script>

// =====================
// 🗺 КАРТА
// =====================
const map = L.map('map').setView([58.0, 37.5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

// =====================
// 📍 МАРШРУТ
// =====================
const route = [
  [59.9311, 30.3609, "СПб"],
  [56.8389, 60.6057, "по пути"],
  [55.7558, 37.6173, "Москва"],
  [57.6261, 39.8845, "Ярославль"],
  [56.8587, 35.9006, "Тверь"]
];

route.forEach(p => {
  L.marker([p[0], p[1]]).addTo(map)
    .bindPopup(p[2]);
});

const polyline = L.polyline(route.map(p => [p[0], p[1]]), {
  color: 'cyan'
}).addTo(map);

map.fitBounds(polyline.getBounds());

// =====================
// 🚗 МАШИНА
// =====================
let car = L.marker(route[0], {
  icon: L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
    iconSize: [32, 32]
  })
}).addTo(map);

// =====================
// 🎬 ДВИЖЕНИЕ
// =====================
let i = 0;
let step = 0;
const STEPS = 30;

function interpolate(a, b, t) {
  return [
    a[0] + (b[0] - a[0]) * t,
    a[1] + (b[1] - a[1]) * t
  ];
}

setInterval(() => {
  const from = route[i];
  const to = route[(i + 1) % route.length];

  const t = step / STEPS;
  const pos = interpolate(from, to, t);

  car.setLatLng(pos);
  map.panTo(pos);

  step++;

  if (step > STEPS) {
    step = 0;
    i++;
    if (i >= route.length - 1) i = 0;
  }

}, 200);

// =====================
// 🎮 СИСТЕМА МИССИЙ (НОВАЯ)
// =====================

let missions = [];
let orders = [];
let activeMission = null;

// загрузка меню
fetch("./missions.json")
  .then(res => res.json())
  .then(data => {
    missions = data.categories.flatMap(c => c.missions);

    // тестовые заказы (пока без DonationAlerts)
    addOrder(missions[0]);
    addOrder(missions[1]);
    addOrder(missions[2]);

    renderOrders();
    renderActive();
  });

// =====================
// 🎫 ДОБАВЛЕНИЕ ЗАКАЗА
// =====================
function addOrder(mission) {
  orders.push({
    ...mission,
    status: "pending"
  });
}

// =====================
// 📋 ОЧЕРЕДЬ
// =====================
function renderOrders() {
  const queue = document.getElementById("missionQueue");
  queue.innerHTML = "";

  orders.forEach(o => {
    const li = document.createElement("li");
    li.textContent = `${o.name} (${o.price}₽)`;
    queue.appendChild(li);
  });
}

// =====================
// 🎬 АКТИВНАЯ МИССИЯ
// =====================
function renderActive() {
  document.getElementById("activeMission").textContent =
    activeMission ? activeMission.name : "— нет активной миссии";
}

// =====================
// ➡️ ВЗЯТЬ СЛЕДУЮЩУЮ
// =====================
function nextMission() {
  if (orders.length === 0) return;

  activeMission = orders.shift();
  activeMission.status = "active";

  renderOrders();
  renderActive();
}

// =====================
// ✅ ВЫПОЛНЕНО
// =====================
function completeMission() {
  if (!activeMission) return;

  activeMission.status = "done";
  activeMission = null;

  renderOrders();
  renderActive();
}

</script>

</body>
</html>
