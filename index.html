<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Road Show Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

#top {
  padding: 10px;
  background: #1c1c1c;
  font-size: 14px;
}

#map {
  height: 65vh;
  width: 100%;
}

.panel {
  padding: 10px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  margin-right: 5px;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="top">
🚗 Road Show | Leaflet MVP | режим: LIVE SIM
</div>

<div id="map"></div>

<div class="panel">

  <div class="card">
    🧭 Маршрут: СПб → Москва → Ярославль → Тверь
  </div>

  <div class="card">
    🚗 Машина двигается по маршруту (симуляция)
  </div>

  <div class="card">
    🎮 Миссии
  </div>

  <div class="card">
    🟡 Активная миссия:
    <div id="activeMission">— нет миссии</div>
  </div>

  <div class="card">
    📋 Очередь:
    <ul id="missionQueue"></ul>
  </div>

  <div class="card">
    <button onclick="completeMission()">✅ Выполнить</button>
    <button onclick="nextMission()">➡️ Следующая</button>
  </div>

</div>

<script>

// =====================
// 🗺 КАРТА
// =====================
const map = L.map('map').setView([58.0, 37.5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

// =====================
// 📍 МАРШРУТ
// =====================
const route = [
  [59.9311, 30.3609, "СПб"],
  [56.8389, 60.6057, "по пути"],
  [55.7558, 37.6173, "Москва"],
  [57.6261, 39.8845, "Ярославль"],
  [56.8587, 35.9006, "Тверь"]
];

// маркеры
route.forEach(p => {
  L.marker([p[0], p[1]]).addTo(map)
    .bindPopup(p[2]);
});

// линия маршрута
const polyline = L.polyline(route.map(p => [p[0], p[1]]), {
  color: 'cyan'
}).addTo(map);

map.fitBounds(polyline.getBounds());

// =====================
// 🚗 МАШИНА
// =====================
let car = L.marker(route[0], {
  icon: L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
    iconSize: [32, 32]
  })
}).addTo(map);

// =====================
// 🎬 ДВИЖЕНИЕ
// =====================
let i = 0;
let step = 0;
const STEPS = 30;

function interpolate(a, b, t) {
  return [
    a[0] + (b[0] - a[0]) * t,
    a[1] + (b[1] - a[1]) * t
  ];
}

setInterval(() => {
  const from = route[i];
  const to = route[(i + 1) % route.length];

  const t = step / STEPS;
  const pos = interpolate(from, to, t);

  car.setLatLng(pos);
  map.panTo(pos);

  step++;

  if (step > STEPS) {
    step = 0;
    i++;
    if (i >= route.length - 1) i = 0;
  }

}, 200);

// =====================
// 🎮 МИССИИ
// =====================
let missions = [
  "Сделать фото дороги",
  "Включить любимую песню",
  "Остановиться и размяться",
  "Купить воду/кофе",
  "Найти странный дорожный знак"
];

let activeMission = null;

function renderMissions() {
  const queue = document.getElementById("missionQueue");
  queue.innerHTML = "";

  missions.forEach(m => {
    const li = document.createElement("li");
    li.textContent = m;
    queue.appendChild(li);
  });

  document.getElementById("activeMission").textContent =
    activeMission || "— нет миссии";
}

function nextMission() {
  if (missions.length === 0) {
    activeMission = null;
    renderMissions();
    return;
  }

  activeMission = missions.shift();
  renderMissions();
}

function completeMission() {
  activeMission = null;
  renderMissions();
}

// старт
renderMissions();

</script>

</body>
</html>
